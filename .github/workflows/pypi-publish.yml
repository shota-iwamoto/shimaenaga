name: Build and publish to PyPI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_wheels:
    name: Wheels • ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macos-13 (the last Intel runner) is retired on GitHub Actions --
        # jobs targeting it queue forever. macos-14 covers Apple Silicon;
        # Intel-mac users fall back to building from the sdist.
        os: [ubuntu-latest, windows-latest, macos-14]

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21.3
        env:
          # cp38 is EOL; add/remove tags here as the project's supported
          # versions change.
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-* cp313-*"
          CIBW_SKIP: "*-musllinux* *_i686 *win32"
          # manylinux_2_28 (not the default manylinux2014/glibc-2.17): recent
          # scikit-learn/scipy no longer publish manylinux2014 wheels, so the
          # test step inside the older container tries to build scipy from
          # source and dies on missing OpenBLAS.
          CIBW_MANYLINUX_X86_64_IMAGE: "manylinux_2_28"
          # Show the real build-backend output so failures are debuggable
          # (default verbosity swallows the actual compiler/pip error).
          CIBW_BUILD_VERBOSITY: "1"
          # Smoke-test every wheel against the real suite right after it's
          # built, using the compiled extension inside the wheel itself.
          CIBW_TEST_REQUIRES: "pytest numpy scikit-learn pandas"
          # The bare-import check runs from cibuildwheel's temp cwd, so it
          # exercises the wheel alone. The pytest run does NOT: tests/python/
          # conftest.py prepends {project}/python to sys.path, masking a wheel
          # that's missing the pure-Python package.
          CIBW_TEST_COMMAND: >-
            python -c "import shimaenaga; assert shimaenaga._backend == 'pybind11', shimaenaga._backend" &&
            pytest {project}/tests/python -q

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  build_sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist
        run: |
          pip install build
          python -m build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish_pypi:
    name: Publish to PyPI
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/shimaenaga/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: "wheels-*"
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
